services:
  agent:
    build:
      target: production
    volumes:
      # Only persistent data volumes in production
      - agent_data:/app/data
      - agent_logs:/app/logs
    ports:
      # Only expose necessary ports
      - "${AGENT_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  qdrant:
    restart: unless-stopped
    # Don't expose ports externally in production (only internal network)
    ports: []
    # Resource limits for Qdrant
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  db:
    restart: unless-stopped
    # Don't expose port externally in production
    ports: []
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  web:
    restart: unless-stopped
    ports:
      - "${DJANGO_PORT:-8002}:8000"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  metabase:
    restart: unless-stopped
    ports:
      - "${METABASE_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

volumes:
  agent_data:
    driver: local
  agent_logs:
    driver: local
