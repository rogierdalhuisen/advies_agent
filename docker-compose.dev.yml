services:
  agent:
    build:
      target: development
    volumes:
      # Mount source code for hot-reloading
      - ./src:/app/src
      - ./main.py:/app/main.py
      # Mount logs for easy access
      - ./logs:/app/logs
      # Mount data directory
      - ./data:/app/data
      # Mount .env for accessing environment variables
      - ./.env:/app/.env
    ports:
      - "8001:8000"  # Expose for local development
      - "5678:5678"  # Debug port (e.g., for debugpy)
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
    # Keep container running in development mode for testing
    command: tail -f /dev/null
    # Alternative commands:
    # command: python -m debugpy --listen 0.0.0.0:5678 main.py
    # command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"  # Don't auto-restart in dev mode
    networks:
      - agent_network

  qdrant:
    ports:
      - "6333:6333"  # Expose locally for debugging
      - "6334:6334"
    restart: "no"  # Don't auto-restart in dev mode

  # JupyterLab for interactive development
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: advies_agent_jupyter
    ports:
      - "8888:8888"  # JupyterLab interface
    volumes:
      # Mount source code - notebooks can stay in src/
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./data:/app/data
      - ./logs:/app/logs
      # Mount .env for accessing environment variables
      - ./.env:/app/.env
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --ServerApp.token='' --ServerApp.password='' --ServerApp.allow_origin='*' --ServerApp.disable_check_xsrf=True
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"
    networks:
      - agent_network

  # PostgreSQL for Chainlit chat history
  postgres_chainlit:
    image: postgres:16-alpine
    container_name: advies_agent_chainlit_db
    environment:
      - POSTGRES_USER=chainlit
      - POSTGRES_PASSWORD=chainlit
      - POSTGRES_DB=chainlit
    volumes:
      - chainlit_pg_data:/var/lib/postgresql/data
      - ./docker/chainlit_db_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainlit"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: "no"
    networks:
      - agent_network

  # Chainlit frontend for agent testing
  chainlit:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: advies_agent_chainlit
    ports:
      - "8000:8000"  # Chainlit UI
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - POSTGRES_HOST=expat_insurance_db
      - POSTGRES_PORT=5432
      - PYTHONPATH=/app:/app/src/retrieval
      - CHAINLIT_AUTH_SECRET=dev-secret-key-change-in-production
      - CHAINLIT_DB_URL=postgresql+asyncpg://chainlit:chainlit@postgres_chainlit:5432/chainlit
    command: chainlit run src/frontend/app.py --host 0.0.0.0 --port 8000 -w
    depends_on:
      qdrant:
        condition: service_healthy
      postgres_chainlit:
        condition: service_healthy
    restart: "no"
    networks:
      - agent_network
      - shared_network

volumes:
  chainlit_pg_data:
    driver: local
